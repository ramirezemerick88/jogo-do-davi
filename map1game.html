<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
overflow:hidden;
background:black;
}

canvas{
border:1px solid #d3d3d3;
background:url('map1.png');
background-size:cover;
animation: animatedBackground 5s linear infinite;
}

#controles{
position:fixed;
bottom:10px;
width:100%;
display:flex;
justify-content:center;
gap:20px;
}

button{
width:70px;
height:70px;
font-size:30px;
border:none;
border-radius:10px;
background:white;
}

@keyframes animatedBackground{
from{background-position:0 0;}
to{background-position:0 2000px;}
}

</style>

</head>

<body onload="startGame()">

<div id="controles">

<button ontouchstart="moveleft()">⬅️</button>
<button ontouchstart="moveright()">➡️</button>

</div>

<script>

var myGamePiece;
var spawnpoint=0;
var type=0;
var myObstacles=[];
var myScore;

function startGame(){

myGamePiece=new component(40,70,"car6.png",200,400,"image");

myScore=new component("30px","Impact","white",20,40,"text");

myGameArea.start();

}

var myGameArea={

canvas:document.createElement("canvas"),

start:function(){

this.canvas.width=window.innerWidth;
this.canvas.height=window.innerHeight;

this.context=this.canvas.getContext("2d");

document.body.insertBefore(this.canvas,document.body.childNodes[0]);

this.frameNo=0;

this.interval=setInterval(updateGameArea,20);

window.addEventListener('keydown',function(e){
myGameArea.key=e.keyCode;
})

window.addEventListener('keyup',function(e){
myGameArea.key=false;
})

},

clear:function(){
this.context.clearRect(0,0,this.canvas.width,this.canvas.height);
},

stop:function(){
clearInterval(this.interval);
}

}

function component(width,height,color,x,y,type){

this.type=type;

if(type=="image"){
this.image=new Image();
this.image.src=color;
}

this.width=width;
this.height=height;
this.speedX=0;
this.speedY=0;
this.x=x;
this.y=y;

this.update=function(){

ctx=myGameArea.context;

if(this.type=="text"){

ctx.font=this.width+" "+this.height;
ctx.fillStyle=color;
ctx.fillText(this.text,this.x,this.y);

}

if(type=="image"){

ctx.drawImage(this.image,this.x,this.y,this.width,this.height);

}

}

this.newPos=function(){

this.x+=this.speedX;
this.y+=this.speedY;

}

this.crashWith=function(otherobj){

var myleft=this.x;
var myright=this.x+this.width;
var mytop=this.y;
var mybottom=this.y+this.height;

var otherleft=otherobj.x;
var otherright=otherobj.x+otherobj.width;
var othertop=otherobj.y;
var otherbottom=otherobj.y+otherobj.height;

var crash=true;

if((mybottom<othertop)||(mytop>otherbottom)||(myright<otherleft)||(myleft>otherright)){

crash=false;

}

return crash;

}

}

function updateGameArea(){

for(i=0;i<myObstacles.length;i++){

if(myGamePiece.crashWith(myObstacles[i])){

alert("FIM DE JOGO");

location.reload();

return;

}

}

myGameArea.clear();

myGameArea.frameNo+=1;

if(myGameArea.frameNo==1||everyinterval(80)){

spawnpoint=Math.floor(Math.random()*(window.innerWidth-100));

type=Math.floor(Math.random()*7)+1;

if(type==1){myObstacles.push(new component(40,70,"car1.png",spawnpoint,0,"image"))}
if(type==2){myObstacles.push(new component(40,70,"car2.png",spawnpoint,0,"image"))}
if(type==3){myObstacles.push(new component(40,70,"car3.png",spawnpoint,0,"image"))}
if(type==4){myObstacles.push(new component(40,70,"car4.png",spawnpoint,0,"image"))}
if(type==5){myObstacles.push(new component(40,70,"car5.png",spawnpoint,0,"image"))}
if(type==6){myObstacles.push(new component(50,50,"barrel.png",spawnpoint,0,"image"))}
if(type==7){myObstacles.push(new component(60,50,"roadblock.png",spawnpoint,0,"image"))}

}

for(i=0;i<myObstacles.length;i++){

myObstacles[i].y+=4;

myObstacles[i].update();

}

myScore.text="PONTUAÇÃO: "+myGameArea.frameNo;

myScore.update();

myGamePiece.speedX=0;

if(myGameArea.key&&myGameArea.key==37){myGamePiece.speedX=-4}
if(myGameArea.key&&myGameArea.key==39){myGamePiece.speedX=4}

myGamePiece.newPos();

myGamePiece.update();

}

function everyinterval(n){

if((myGameArea.frameNo/n)%1==0){return true}

return false;

}

function moveleft(){

myGamePiece.speedX=-6;

}

function moveright(){

myGamePiece.speedX=6;

}

</script>

</body>
</html>
