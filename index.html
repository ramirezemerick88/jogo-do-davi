<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Corrida do Davi</title>

<style>
body{
margin:0;
overflow:hidden;
background:#222;
font-family:Arial;
}

#game{
position:relative;
width:100vw;
height:100vh;
background:#444;
overflow:hidden;
}

#car{
position:absolute;
width:80px;
bottom:20px;
left:50%;
transform:translateX(-50%);
}

.enemy{
position:absolute;
width:80px;
}

#score{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:24px;
}

</style>
</head>

<body>

<div id="game">

<img id="car" src="https://upload.wikimedia.org/wikipedia/commons/6/6d/VW_Beetle_1970.png">

<div id="score">Pontuação: 0</div>

</div>

<script>

let car = document.getElementById("car")
let game = document.getElementById("game")
let score = document.getElementById("score")

let pontos = 0

document.addEventListener("mousemove",(e)=>{

car.style.left = e.clientX+"px"

})

function criarInimigo(){

let enemy = document.createElement("div")

enemy.classList.add("enemy")

enemy.style.background="red"
enemy.style.height="80px"
enemy.style.left=Math.random()*window.innerWidth+"px"
enemy.style.top="-100px"

game.appendChild(enemy)

let cair=setInterval(()=>{

enemy.style.top=enemy.offsetTop+6+"px"

let carRect=car.getBoundingClientRect()
let enemyRect=enemy.getBoundingClientRect()

if(
enemyRect.bottom>carRect.top &&
enemyRect.left<carRect.right &&
enemyRect.right>carRect.left
){

alert("Game Over")

location.reload()

}

if(enemy.offsetTop>window.innerHeight){

pontos++
score.innerHTML="Pontuação: "+pontos

enemy.remove()
clearInterval(cair)

}

},20)

}

setInterval(criarInimigo,2000)

</script>

</body>
</html>
